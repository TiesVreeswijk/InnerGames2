name: tweekracht_sociality
description: Companion app for Tweekracht Sociality board game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.5
  
  # QR Code & Scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  
  # Share Functionality
  share_plus: ^7.2.2
  
  # Firebase - UPDATED to latest versions for Xcode 16 compatibility
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.2
  firebase_auth: ^5.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  # SF Pro font - user will add font files
