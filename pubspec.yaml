name: tweekracht_sociality
description: Companion app for Tweekracht Sociality board game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Existing dependencies
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2
  
  # NEW: Firebase dependencies
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6
  firebase_auth: ^4.15.3
  
  # NEW: Share functionality
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    
