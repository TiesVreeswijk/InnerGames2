version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2

dev_dependencies:
